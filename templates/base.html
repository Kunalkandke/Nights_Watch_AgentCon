<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}MedComply AI{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F0F4F8;color:#1a2332;min-height:100vh}
nav{background:#0f2744;color:white;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.3)}
nav .logo{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:.6rem}
nav .logo span{color:#4FC3F7}
nav a{color:#b0c4de;text-decoration:none;font-size:.85rem;padding:.4rem .8rem;border-radius:6px;transition:.15s}
nav a:hover{background:rgba(255,255,255,.1);color:white}
nav a.active{background:#1a4a7a;color:white}
.container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
.card{background:white;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);border:1px solid #e2e8f0;overflow:hidden}
.card-header{padding:1.2rem 1.5rem;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:1.5rem}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.4rem;border-radius:8px;font-size:.875rem;font-weight:600;cursor:pointer;border:none;transition:.15s;text-decoration:none}
.btn-primary{background:#0f2744;color:white}.btn-primary:hover{background:#1a4a7a}
.btn-success{background:#059669;color:white}.btn-success:hover{background:#047857}
.btn-danger{background:#dc2626;color:white}.btn-danger:hover{background:#b91c1c}
.btn-outline{background:transparent;border:1.5px solid #0f2744;color:#0f2744}.btn-outline:hover{background:#0f2744;color:white}
.badge{display:inline-flex;align-items:center;padding:.25rem .7rem;border-radius:20px;font-size:.75rem;font-weight:600;gap:.3rem}
.badge-green{background:#dcfce7;color:#15803d}
.badge-yellow{background:#fef9c3;color:#a16207}
.badge-red{background:#fee2e2;color:#dc2626}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-gray{background:#f1f5f9;color:#64748b}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1.2rem}
.stat-card{background:white;border-radius:14px;padding:1.4rem;border:1px solid #e2e8f0;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.stat-value{font-size:2rem;font-weight:800;line-height:1}
.stat-label{font-size:.8rem;color:#64748b;margin-top:.4rem;font-weight:500}
.alert{padding:1rem 1.2rem;border-radius:10px;font-size:.875rem;margin-bottom:1rem}
.alert-error{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}
.alert-success{background:#dcfce7;color:#15803d;border:1px solid #86efac}
.table{width:100%;border-collapse:collapse;font-size:.875rem}
.table th{background:#f8fafc;padding:.8rem 1rem;text-align:left;font-weight:600;color:#475569;border-bottom:2px solid #e2e8f0;font-size:.8rem;text-transform:uppercase;letter-spacing:.04em}
.table td{padding:.85rem 1rem;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.table tr:hover td{background:#fafafa}
.progress-bar{height:10px;border-radius:5px;background:#e2e8f0;overflow:hidden}
.progress-fill{height:100%;border-radius:5px;transition:width .5s}
.score-circle{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;border:4px solid}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1e293b;color:white;padding:.8rem 1.4rem;border-radius:10px;font-size:.875rem;z-index:999;animation:slidein .3s ease}
@keyframes slidein{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.agent-step{display:flex;align-items:center;gap:.8rem;padding:.8rem 1rem;border-radius:10px;background:#f8fafc;border:1px solid #e2e8f0;margin-bottom:.6rem}
.agent-step .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-green{background:#22c55e}.dot-blue{background:#3b82f6}.dot-yellow{background:#f59e0b}.dot-red{background:#ef4444}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #e2e8f0;border-top-color:#0f2744;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<nav>
  <div class="logo">
    <span>🏥</span> MedComply <span>AI</span>
    <small style="color:#64748b;font-size:.7rem;font-weight:400;margin-left:.5rem">AgentCon 2026</small>
  </div>
  <div style="display:flex;gap:.3rem;align-items:center">
    <a href="/dashboard" class="{% block nav_dashboard %}{% endblock %}">Dashboard</a>
    <a href="/analyze" class="{% block nav_analyze %}{% endblock %}">Analyze Document</a>
    <span style="background:#4FC3F7;color:#0f2744;padding:.3rem .8rem;border-radius:6px;font-size:.75rem;font-weight:700">BETA</span>
  </div>
</nav>
{% block body %}{% endblock %}
<script>
function showToast(msg,type){
  var t=document.createElement('div');
  t.className='toast';
  t.style.background=type==='error'?'#dc2626':'#059669';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove()},3000);
}
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
