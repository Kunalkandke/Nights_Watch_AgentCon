<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}MedComply AI{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F8F6F4;color:#1a2332;min-height:100vh}

/* Nav */
nav{background:white;border-bottom:1px solid #f0ebe6;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:40;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.nav-logo{display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:1rem;color:#7B2C2C}
.nav-logo svg{width:28px;height:28px;background:#7B2C2C;border-radius:8px;padding:5px}
nav a{color:#6b7280;text-decoration:none;font-size:.875rem;padding:.4rem .75rem;border-radius:8px;transition:.15s;font-weight:500}
nav a:hover{background:#f5f0ec;color:#7B2C2C}
nav a.active{background:#7B2C2C;color:white}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}

/* Cards */
.card{background:white;border-radius:16px;border:1px solid #f0ebe6;box-shadow:0 1px 4px rgba(0,0,0,.06),0 2px 12px rgba(0,0,0,.04);overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.card-header{padding:1rem 1.5rem;border-bottom:1px solid #f8f5f2;display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-weight:600;font-size:.9rem;color:#1a2332}
.card-body{padding:1.5rem}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.55rem 1.2rem;border-radius:10px;font-size:.875rem;font-weight:600;cursor:pointer;border:none;transition:.15s;text-decoration:none;font-family:inherit}
.btn-primary{background:#7B2C2C;color:white}.btn-primary:hover{background:#5a1f1f}
.btn-outline{background:transparent;border:1.5px solid #7B2C2C;color:#7B2C2C}.btn-outline:hover{background:#7B2C2C;color:white}
.btn-light{background:#f5f0ec;color:#7B2C2C;border:1px solid #e8d8d0}.btn-light:hover{background:#eeddd6}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:.2rem .65rem;border-radius:20px;font-size:.72rem;font-weight:600}
.badge-green{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.badge-yellow{background:#fefce8;color:#a16207;border:1px solid #fde047}
.badge-red{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
.badge-blue{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.badge-gray{background:#f8fafc;color:#64748b;border:1px solid #e2e8f0}
.badge-primary{background:#fdf0f0;color:#7B2C2C;border:1px solid #f0c8c8}

/* Grid */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1.2rem}

/* Stat cards */
.stat-card{background:white;border-radius:16px;padding:1.4rem 1.5rem;border:1px solid #f0ebe6;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.stat-value{font-size:2.2rem;font-weight:800;line-height:1;color:#7B2C2C}
.stat-label{font-size:.78rem;color:#9ca3af;margin-top:.35rem;font-weight:500;text-transform:uppercase;letter-spacing:.04em}

/* Table */
.table{width:100%;border-collapse:collapse;font-size:.875rem}
.table th{background:#faf8f6;padding:.75rem 1.2rem;text-align:left;font-weight:600;color:#7B2C2C;border-bottom:1.5px solid #f0ebe6;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}
.table td{padding:.85rem 1.2rem;border-bottom:1px solid #faf8f6;vertical-align:middle;color:#374151}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:#fdfbf9}

/* Progress */
.progress-bar{height:8px;border-radius:4px;background:#f0ebe6;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s ease}

/* Alert */
.alert{padding:.9rem 1.2rem;border-radius:10px;font-size:.875rem;margin-bottom:1rem}
.alert-error{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
.alert-success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}

/* Agent step */
.agent-step{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:10px;background:#faf8f6;border:1px solid #f0ebe6;margin-bottom:.5rem}
.step-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:#d1d5db}
.step-dot.active{background:#7B2C2C}
.step-dot.done{background:#22c55e}

/* Spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #f0ebe6;border-top-color:#7B2C2C;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Timeline */
.timeline-dot{width:10px;height:10px;border-radius:50%;background:#7B2C2C;border:2px solid white;box-shadow:0 0 0 2px #7B2C2C;flex-shrink:0}
.timeline-line{width:2px;background:#f0ebe6;flex-grow:1;margin:.25rem auto}

/* Section */
.section-title{font-size:.75rem;font-weight:700;color:#7B2C2C;text-transform:uppercase;letter-spacing:.07em;margin-bottom:1rem}

/* Verdict banner */
.verdict-pass{background:#f0fdf4;border:1px solid #86efac;color:#15803d;padding:.6rem 1.2rem;border-radius:10px;font-weight:700;font-size:.875rem}
.verdict-fail{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;padding:.6rem 1.2rem;border-radius:10px;font-weight:700;font-size:.875rem}
.verdict-cond{background:#fefce8;border:1px solid #fde047;color:#a16207;padding:.6rem 1.2rem;border-radius:10px;font-weight:700;font-size:.875rem}

@media(max-width:768px){.grid-3,.grid-2{grid-template-columns:1fr}}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<nav>
  <div class="nav-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
    </svg>
    MedComply AI
    <span style="color:#C86F6F;font-weight:400;font-size:.75rem;margin-left:.25rem">/ AgentCon 2026</span>
  </div>
  <div style="display:flex;gap:.25rem;align-items:center">
    <a href="/dashboard" class="{% block nav_dashboard %}{% endblock %}">Dashboard</a>
    <a href="/analyze" class="{% block nav_analyze %}{% endblock %}">Analyze Document</a>
  </div>
</nav>
{% block body %}{% endblock %}
{% block extra_scripts %}{% endblock %}
</body>
</html>
